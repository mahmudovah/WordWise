{% extends 'base.html' %}

{% block title %}Yangi bo‘lim qo‘shish{% endblock %}

{% block content %}

<div class="container mt-4" style="max-width:600px;">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">
            <i class="fa-solid fa-folder-plus text-primary"></i>
            Yangi bo‘lim
        </h4>

        <a href="{% url 'index' %}" class="btn btn-outline-secondary">
            <i class="fa-solid fa-arrow-left"></i> Ortga
        </a>
    </div>

    <!-- Form -->
    <div class="card shadow-sm border-0 p-4">
        <form method="POST">
            {% csrf_token %}

            <!-- Title -->
            <div class="mb-3">
                <label class="form-label">Bo‘lim nomi</label>
                <input type="text" name="title" class="form-control" required>
            </div>

            <!-- Public -->
            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" name="is_public" id="publicCheck">
                <label class="form-check-label" for="publicCheck">
                    Hammaga ochiq (public)
                </label>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn btn-primary w-100">
                <i class="fa-solid fa-check"></i> Saqlash
            </button>

        </form>
    </div>

</div>

{% endblock %}
