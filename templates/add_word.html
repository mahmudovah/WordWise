{% extends 'base.html' %}

{% block title %}Yangi so‘z qo‘shish{% endblock %}

{% block content %}

<div class="container mt-4" style="max-width:600px;">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">
            <i class="fa-solid fa-plus text-primary"></i>
            Yangi so‘z
        </h4>

        <a href="{% url 'index' %}" class="btn btn-outline-secondary">
            <i class="fa-solid fa-arrow-left"></i> Ortga
        </a>
    </div>

    <!-- Form -->
    <div class="card shadow-sm border-0 p-4">
        <form method="POST">
            {% csrf_token %}

            <!-- Word -->
            <div class="mb-3">
                <label class="form-label">So‘z</label>
                <input type="text" name="word" class="form-control" required>
            </div>

            <!-- Translation -->
            <div class="mb-3">
                <label class="form-label">Tarjimasi</label>
                <input type="text" name="translated" class="form-control" required>
            </div>

            <!-- Definition -->
            <div class="mb-3">
                <label class="form-label">Izoh (ixtiyoriy)</label>
                <textarea name="definition" class="form-control" rows="3"></textarea>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn btn-primary w-100">
                <i class="fa-solid fa-check"></i> Saqlash
            </button>

        </form>
    </div>

</div>

{% endblock %}
