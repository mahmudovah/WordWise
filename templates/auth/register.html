{% extends 'base.html' %}

{% block title %}Ro‘yxatdan o‘tish{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-4">

                <h3 class="text-center mb-4 fw-bold">
                    <i class="fa-solid fa-user-plus text-success"></i>
                    Ro‘yxatdan o‘tish
                </h3>

                <form method="post">
                    {% csrf_token %}

                    <!-- First Name -->
                    <div class="mb-3">
                        <label class="form-label">Ism</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fa-solid fa-user"></i>
                            </span>
                            <input type="text" name="first_name" class="form-control" placeholder="Ismingiz" required>
                        </div>
                    </div>

                    <!-- Last Name -->
                    <div class="mb-3">
                        <label class="form-label">Familiya</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fa-solid fa-user-tag"></i>
                            </span>
                            <input type="text" name="last_name" class="form-control" placeholder="Familiyangiz" required>
                        </div>
                    </div>

                    <!-- Email -->
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fa-solid fa-envelope"></i>
                            </span>
                            <input type="email" name="email" class="form-control" placeholder="email@example.com" required>
                        </div>
                    </div>

                    <!-- Password -->
                    <div class="mb-3">
                        <label class="form-label">Parol</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fa-solid fa-lock"></i>
                            </span>
                            <input type="password" name="password" class="form-control" placeholder="Kamida 6 ta belgidan iborat" required>
                        </div>
                    </div>

                    <!-- Submit -->
                    <div class="d-grid mt-3">
                        <button type="submit" class="btn btn-success rounded-3">
                            <i class="fa-solid fa-user-plus me-1"></i> Ro‘yxatdan o‘tish
                        </button>
                    </div>

                </form>

                <hr>

                <div class="text-center">
                    <small>
                        Allaqachon hisobingiz bormi?
                        <a href="{% url 'login' %}" class="text-decoration-none fw-semibold">
                            Kirish
                        </a>
                    </small>
                </div>

            </div>
        </div>
    </div>
</div>
{% endblock %}
